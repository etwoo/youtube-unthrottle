name: multi-platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  # required by cpp-linter/cpp-linter-action@v2 for files-changed-only: false
  contents: read

jobs:
  build-all:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-26.04, macos-26 ]
        cc: [ gcc, clang ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        if [ "$(uname)" == Linux ] ; then
          sudo ./scripts/setup/apt.sh
        else
          ./scripts/setup/homebrew.sh
        fi
    - name: Choose compiler
      run: |
        if [ "$(uname)" == Linux ] ; then
          echo "CC=${{ matrix.cc }}"
        else
          echo "CC=$(find $(brew --prefix)/bin -maxdepth 1 -type f -name '${{ matrix.cc }}-[0-9]*' | sort -n | tail -1)"
        fi >> "$GITHUB_ENV"
    - name: Configure, build, and test
      run: >
        cmake --preset default -DCMAKE_COMPILE_WARNING_AS_ERROR=ON &&
        cmake --build --preset default --parallel &&
        ctest --preset default
    - uses: ./.github/actions/collect-ctest-logs
      if: failure()
      with:
        unique-suffix: ${{ matrix.os }}-${{ matrix.cc }}

  lint:
    runs-on: ubuntu-26.04
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: >
        sudo ./scripts/setup/apt.sh
    - name: Configure and build
      run: >
        cmake --preset default -DCMAKE_COMPILE_WARNING_AS_ERROR=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=1 &&
        cmake --build --preset default --parallel
    - name: Run clang-format and clang-tidy, including clang-analyzer checks
      id: lint
      uses: cpp-linter/cpp-linter-action@v2
      with:
        style: 'file'   # use .clang-format
        tidy-checks: '' # use .clang-tidy
        version: 22     # use clang-{format,tidy}-22
        database: ./build/
        ignore: ./build/
        files-changed-only: false
        file-annotations: true
        step-summary: true
    - name: Fail job if clang-format or clang-tidy found problems
      if: steps.lint.outputs.checks-failed > 0
      run: exit 1

  coverage:
    runs-on: ubuntu-26.04
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: >
        sudo ./scripts/setup/apt.sh
    - name: Configure, build, and test
      run: >
        cmake --preset coverage -DCMAKE_COMPILE_WARNING_AS_ERROR=ON &&
        cmake --build --preset default --parallel &&
        COVERAGE_PROFILE_DIR=coverage.profraw ctest --preset default
    - uses: ./.github/actions/collect-ctest-logs
      if: failure()
      with:
        unique-suffix: coverage
    - name: Gather code coverage data
      run: >
        ./scripts/coverage.sh -E main.c coverage.profraw ./build/coverage.xml
        | sed 's@^@    @g' >> "$GITHUB_STEP_SUMMARY"

  build-openbsd:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure, build, and test
      uses: vmactions/openbsd-vm@v1.3.7
      with:
        prepare: >
          ./scripts/setup/openbsd.sh
        run: >
          cmake --preset default &&
          cmake --build --preset default &&
          ctest --preset default
    - uses: ./.github/actions/collect-ctest-logs
      if: failure()
      with:
        unique-suffix: openbsd
