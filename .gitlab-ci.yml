image: archlinux/archlinux:base-devel

.build_dependencies: &build_dependencies
    - pacman --noconfirm -Sy clang cmake curl duktape git libseccomp llvm pcre2

.build_steps: &build_steps
    - cmake -Wdev -Werror=dev -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=1 . -B ./build
    - cmake --build ./build
    - cd ./build/tests && ctest --output-junit junit.xml -E '^cli-try-sandbox|sandbox-landlock$' .

build_with_gcc:
  stage: build
  before_script:
    - *build_dependencies
  script:
    - export CC=gcc
    - export CXX=g++
    - *build_steps
  artifacts:
    when: always
    paths:
      - ./build/tests/junit.xml
    reports:
      junit: ./build/tests/junit.xml

build_with_clang:
  stage: build
  before_script:
    - *build_dependencies
  script:
    - export CC=clang
    - export CXX=clang++
    - *build_steps
  artifacts:
    when: always
    paths:
      - ./build/tests/junit.xml
    reports:
      junit: ./build/tests/junit.xml

format:
  stage: build
  before_script:
    - *build_dependencies
  script:
    - cmake -Wdev -Werror=dev -DCMAKE_BUILD_TYPE=Debug . -B ./build
    - cmake --build ./build --target fmt

coverage:
  stage: build
  before_script:
    - *build_dependencies
  script:
    - export CC=clang
    - export CXX=clang++
    - cmake -Wdev -Werror=dev -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=1 -DBUILD_COVERAGE=1 . -B ./build
    - cmake --build ./build
    - ./scripts/coverage.sh
  artifacts:
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    expire_in: 2 days
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ./build/tests/sandbox/sandbox.xml
